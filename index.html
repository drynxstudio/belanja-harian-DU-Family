<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Rekap Logistik & Finansial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f4f7f6; --text-color: #1e293b; --card-bg: #ffffff;
            --border-color: #e2e8f0; --primary: #0f172a; --accent: #2563eb;
            --success: #10b981; --danger: #ef4444; --input-bg: #ffffff;
        }
        [data-theme="dark"] {
            --bg-color: #0f172a; --text-color: #f1f5f9; --card-bg: #1e293b;
            --border-color: #334155; --primary: #f8fafc; --accent: #3b82f6;
            --input-bg: #0f172a;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; transition: 0.3s; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Layouts */
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        .card h3 { font-size: 13px; color: #64748b; text-transform: uppercase; margin: 0 0 10px 0; }
        .card .value { font-size: 24px; font-weight: 700; color: var(--accent); }
        
        /* Controls & Inputs */
        .controls-bar { display: flex; gap: 15px; flex-wrap: wrap; background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 20px; align-items: center; }
        .search-box { flex-grow: 1; position: relative; min-width: 200px; }
        .search-box i { position: absolute; left: 15px; top: 12px; color: #94a3b8; }
        .search-box input { width: 100%; padding: 10px 10px 10px 40px; }
        
        select, input { background: var(--input-bg); color: var(--text-color); border: 1px solid var(--border-color); padding: 10px 15px; border-radius: 8px; font-family: 'Inter', sans-serif; outline: none; box-sizing: border-box; }
        select:focus, input:focus { border-color: var(--accent); }
        
        button { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: 'Inter'; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-dark { background: var(--primary); color: var(--bg-color); }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        
        /* Table */
        .table-wrap { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid var(--border-color); }
        th { font-weight: 600; background: rgba(0,0,0,0.02); }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; background: #e0f2fe; color: #0284c7; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 50; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 450px; padding: 25px; border-radius: 16px; position: relative; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; }
        .close-btn { position: absolute; right: 20px; top: 20px; cursor: pointer; font-size: 20px; color: #94a3b8; }
        
        #loader { text-align: center; padding: 20px; display: none; font-weight: 600; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;"><i class="fas fa-boxes"></i> Rekap Keuangan & Logistik</h2>
        <div style="display: flex; gap: 10px;">
            <button class="btn-dark" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
            <button class="btn-primary" onclick="openModal('formModal')"><i class="fas fa-plus"></i> Catat Baru</button>
        </div>
    </div>

    <div class="grid-cards">
        <div class="card"><h3>Total Hari Ini</h3><div class="value" id="valHari">Rp 0</div></div>
        <div class="card"><h3>Total Minggu Ini</h3><div class="value" id="valMinggu">Rp 0</div></div>
        <div class="card"><h3>Total Bulan Ini</h3><div class="value" id="valBulan">Rp 0</div></div>
        <div class="card"><h3>Total Tahun Ini</h3><div class="value" id="valTahun">Rp 0</div></div>
    </div>

    <div class="controls-bar">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Cari nama barang atau kategori..." onkeyup="applyFilter()">
        </div>
        <select id="filterBulan" onchange="applyFilter()">
            <option value="semua">Semua Bulan</option>
            <option value="0">Januari</option>
            <option value="1">Februari</option>
            <option value="2">Maret</option>
            <option value="3">April</option>
            <option value="4">Mei</option>
            <option value="5">Juni</option>
            <option value="6">Juli</option>
            <option value="7">Agustus</option>
            <option value="8">September</option>
            <option value="9">Oktober</option>
            <option value="10">November</option>
            <option value="11">Desember</option>
        </select>
        <select id="filterTahun" onchange="applyFilter()">
            <option value="semua">Semua Tahun</option>
            </select>
        <button class="btn-success" onclick="exportExcel()"><i class="fas fa-file-excel"></i> Excel</button>
        <button class="btn-danger" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
    </div>

    <div id="loader"><i class="fas fa-spinner fa-spin"></i> Mensinkronisasi data...</div>

    <div class="table-wrap">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Tanggal & Hari</th>
                    <th>Nama Belanjaan</th>
                    <th>Kategori</th>
                    <th>Total Biaya</th>
                    <th style="text-align:center;">Aksi</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div class="modal" id="formModal">
    <div class="modal-content">
        <i class="fas fa-times close-btn" onclick="closeModal('formModal')"></i>
        <h3 id="modalTitle" style="margin-top:0;">Catat Pengeluaran Baru</h3>
        <form id="rekapForm">
            <input type="hidden" id="formId">
            <div class="form-group">
                <label>Tanggal Pembelian</label>
                <input type="date" id="tanggal" required>
            </div>
            <div class="form-group">
                <label>Kategori</label>
                <select id="kategori" required>
                    <option value="Bahan Bangunan">Bahan Bangunan</option>
                    <option value="Logistik & Ekspedisi">Logistik & Ekspedisi</option>
                    <option value="Operasional Proyek">Operasional Proyek</option>
                    <option value="Konsumsi">Konsumsi</option>
                    <option value="Alat Berat / Sewa">Alat Berat / Sewa</option>
                    <option value="Lainnya">Lainnya</option>
                </select>
            </div>
            <div class="form-group">
                <label>Rincian Barang</label>
                <input type="text" id="namaBarang" placeholder="Contoh: Semen 50 Sak, Sewa Pick-up..." required>
            </div>
            <div class="form-group">
                <label>Nominal Harga (Rp)</label>
                <input type="text" id="jumlah" placeholder="150.000" onkeyup="formatRibuan(this)" required>
            </div>
            <button type="submit" class="btn-primary" id="btnSubmit" style="width: 100%">Simpan Transaksi</button>
        </form>
    </div>
</div>

<script>
    // --- GANTI DENGAN URL APPS SCRIPT BARU ANDA ---
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwUeLobYK_QILBRm612kgx9N9IVPPBfKgnVtem0hrEV3MPWMo6iXreewqZIkXlHApKA/exec'; 
    
    let globalData = [];
    document.getElementById('tanggal').valueAsDate = new Date();

    // Tema Gelap/Terang
    function toggleTheme() {
        const body = document.body;
        body.dataset.theme = body.dataset.theme === 'dark' ? 'light' : 'dark';
    }

    // Format Ribuan Real-time
    function formatRibuan(obj) {
        let val = obj.value.replace(/[^,\d]/g, '').toString();
        let split = val.split(',');
        let sisa = split[0].length % 3;
        let rupiah = split[0].substr(0, sisa);
        let ribuan = split[0].substr(sisa).match(/\d{3}/gi);
        if (ribuan) rupiah += (sisa ? '.' : '') + ribuan.join('.');
        obj.value = rupiah;
    }
    const cleanRupiah = (str) => parseInt(str.replace(/\./g, ''));
    const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);

    // Modal Control
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { 
        document.getElementById(id).classList.remove('active');
        document.getElementById('rekapForm').reset();
        document.getElementById('formId').value = "";
        document.getElementById('modalTitle').innerText = "Catat Pengeluaran Baru";
        document.getElementById('tanggal').valueAsDate = new Date();
    }

    // Ambil Data
    async function loadData() {
        document.getElementById('loader').style.display = 'block';
        try {
            const res = await fetch(APPS_SCRIPT_URL);
            globalData = await res.json();
            populateYears();
            applyFilter();
        } catch (error) { console.error("Error loading data", error); }
        document.getElementById('loader').style.display = 'none';
    }

    // Mengisi Dropdown Tahun otomatis berdasarkan data yang ada
    function populateYears() {
        const yearSelect = document.getElementById('filterTahun');
        const years = [...new Set(globalData.map(item => new Date(item.tanggal).getFullYear()))];
        yearSelect.innerHTML = '<option value="semua">Semua Tahun</option>';
        years.sort((a,b) => b-a).forEach(year => {
            if(!isNaN(year)) yearSelect.innerHTML += `<option value="${year}">${year}</option>`;
        });
    }

    // Filter Engine Utama (Search, Bulan, Tahun)
    function applyFilter() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const selBulan = document.getElementById('filterBulan').value;
        const selTahun = document.getElementById('filterTahun').value;

        let filtered = [...globalData].sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));

        filtered = filtered.filter(row => {
            const d = new Date(row.tanggal);
            const matchSearch = row.nama.toLowerCase().includes(searchTerm) || (row.kategori && row.kategori.toLowerCase().includes(searchTerm));
            const matchBulan = selBulan === 'semua' || d.getMonth() == selBulan;
            const matchTahun = selTahun === 'semua' || d.getFullYear() == selTahun;
            
            return matchSearch && matchBulan && matchTahun;
        });

        renderTable(filtered);
        calculateDashboard(filtered);
    }

    // Render Tabel dengan Nama Hari Lengkap
    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        data.forEach(row => {
            const d = new Date(row.tanggal);
            const namaHari = new Intl.DateTimeFormat('id-ID', { weekday: 'long' }).format(d);
            const tglLengkap = new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }).format(d);
            
            tbody.innerHTML += `
                <tr>
                    <td><strong>${namaHari}</strong><br><span style="font-size:12px; color:#64748b;">${tglLengkap}</span></td>
                    <td>${row.nama}</td>
                    <td><span class="badge">${row.kategori || 'Lainnya'}</span></td>
                    <td style="font-weight:600; color:var(--accent)">${formatRp(row.jumlah)}</td>
                    <td style="text-align:center;">
                        <button class="btn-primary" style="padding: 6px 10px" onclick="editData('${row.id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn-danger" style="padding: 6px 10px" onclick="deleteData('${row.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
        });
    }

    // Kalkulasi Dashboard Berdasarkan Data yang Di-filter
    function getWeek(d) {
        let date = new Date(d.getTime());
        date.setHours(0, 0, 0, 0);
        date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
        let week1 = new Date(date.getFullYear(), 0, 4);
        return 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
    }

    function calculateDashboard(data) {
        const now = new Date();
        const currWeek = getWeek(now);
        let dHari = 0, dMinggu = 0, dBulan = 0, dTahun = 0;

        data.forEach(r => {
            const d = new Date(r.tanggal);
            const amt = Number(r.jumlah);
            
            if(d.getFullYear() === now.getFullYear()) {
                dTahun += amt;
                if(d.getMonth() === now.getMonth()) dBulan += amt;
                if(getWeek(d) === currWeek) dMinggu += amt;
                if(d.toDateString() === now.toDateString()) dHari += amt;
            }
        });

        document.getElementById('valHari').innerText = formatRp(dHari);
        document.getElementById('valMinggu').innerText = formatRp(dMinggu);
        document.getElementById('valBulan').innerText = formatRp(dBulan);
        document.getElementById('valTahun').innerText = formatRp(dTahun);
    }

    // Submit (Simpan / Edit)
    document.getElementById('rekapForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.innerText = "Memproses..."; btn.disabled = true;

        const formId = document.getElementById('formId').value;
        const payload = {
            action: formId ? 'edit' : 'add',
            id: formId || Date.now().toString(), // Generate Unique ID
            tanggal: document.getElementById('tanggal').value,
            kategori: document.getElementById('kategori').value,
            nama: document.getElementById('namaBarang').value,
            jumlah: cleanRupiah(document.getElementById('jumlah').value)
        };

        // Menggunakan mode 'follow' redirect agar data lolos di Apps Script
        await fetch(APPS_SCRIPT_URL, {
            redirect: "follow",
            method: 'POST',
            body: JSON.stringify(payload),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });

        closeModal('formModal');
        btn.innerText = "Simpan Transaksi"; btn.disabled = false;
        loadData(); 
    });

    // Panggil Edit
    function editData(id) {
        const row = globalData.find(r => r.id == id);
        if(row) {
            document.getElementById('formId').value = row.id;
            document.getElementById('tanggal').value = new Date(row.tanggal).toISOString().split('T')[0];
            document.getElementById('kategori').value = row.kategori;
            document.getElementById('namaBarang').value = row.nama;
            document.getElementById('jumlah').value = row.jumlah.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            document.getElementById('modalTitle').innerText = "Edit Pengeluaran";
            openModal('formModal');
        }
    }

    // Eksekusi Hapus
    async function deleteData(id) {
        if(confirm("Hapus baris data ini secara permanen?")) {
            document.getElementById('loader').style.display = 'block';
            await fetch(APPS_SCRIPT_URL, {
                redirect: "follow",
                method: 'POST',
                body: JSON.stringify({ action: 'delete', id: id }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            loadData();
        }
    }

    // Ekspor (Sesuai Filter yang aktif)
    function exportExcel() {
        const table = document.getElementById("dataTable");
        const wb = XLSX.utils.table_to_book(table, {sheet: "Laporan"});
        XLSX.writeFile(wb, "Laporan_Logistik.xlsx");
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Laporan Pengeluaran Logistik", 14, 15);
        doc.autoTable({ html: '#dataTable', startY: 20 });
        doc.save("Laporan_Logistik.pdf");
    }

    // Jalankan pertama kali
    window.onload = loadData;
</script>
</body>
</html>
