<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Belanja Keluarga</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --sub: #64748b;
            --primary: #6366f1; --border: #e2e8f0; --danger: #ef4444; --success: #22c55e;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* UI Baru yang Lebih Keren */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: linear-gradient(135deg, #6366f1, #a855f7); padding: 25px; border-radius: 20px; color: white; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3); }
        .header h2 { margin: 0; font-size: 22px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .stat-card span { font-size: 12px; color: var(--sub); font-weight: 600; text-transform: uppercase; }
        .stat-card div { font-size: 20px; font-weight: 700; margin-top: 5px; color: var(--primary); }

        /* Search & Filter */
        .search-area { background: var(--card); padding: 15px; border-radius: 16px; border: 1px solid var(--border); display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-box { flex: 1; position: relative; min-width: 250px; }
        .search-box i { position: absolute; left: 15px; top: 12px; color: var(--sub); }
        .search-box input { width: 100%; padding: 10px 10px 10px 40px; border: 1px solid var(--border); border-radius: 10px; outline: none; font-family: inherit; transition: 0.2s; }
        .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        
        select { padding: 10px; border-radius: 10px; border: 1px solid var(--border); font-family: inherit; outline: none; cursor: pointer; }

        /* Button & Table */
        button { padding: 10px 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-family: inherit; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-add { background: white; color: var(--primary); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-export { background: #f1f5f9; color: var(--text); border: 1px solid var(--border); }
        
        .table-wrap { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 15px; text-align: left; font-size: 13px; color: var(--sub); border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:last-child td { border: none; }
        .cat-tag { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; background: #eef2ff; color: #4338ca; }

        /* Modal Pop-up */
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); position: relative; }
        .modal-content h3 { margin-top: 0; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; box-sizing: border-box; }
        
        #loader { display: none; text-align: center; padding: 10px; color: var(--primary); font-weight: 700; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2><i class="fas fa-home"></i> Belanja Keluarga</h2>
            <div id="loader"><i class="fas fa-sync fa-spin"></i> Sinkronisasi...</div>
        </div>
        <button class="btn-add" onclick="openModal('formModal')"><i class="fas fa-plus"></i> Catat Belanja</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><span>Hari Ini</span><div id="vHari">Rp 0</div></div>
        <div class="stat-card"><span>Minggu Ini</span><div id="vMinggu">Rp 0</div></div>
        <div class="stat-card"><span>Bulan Ini</span><div id="vBulan">Rp 0</div></div>
        <div class="stat-card"><span>Tahun Ini</span><div id="vTahun">Rp 0</div></div>
    </div>

    <div class="search-area">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="mainSearch" placeholder="Cari nama barang, kategori, hari, atau bulan..." onkeyup="applyFilter()">
        </div>
        <select id="selTahun" onchange="applyFilter()"><option value="semua">Semua Tahun</option></select>
        <button class="btn-export" onclick="exportExcel()"><i class="fas fa-file-excel"></i></button>
        <button class="btn-export" onclick="exportPDF()"><i class="fas fa-file-pdf"></i></button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Nama Barang</th>
                    <th>Kategori</th>
                    <th>Harga</th>
                    <th style="text-align:center">Aksi</th>
                </tr>
            </thead>
            <tbody id="tBody"></tbody>
        </table>
    </div>
</div>

<div class="modal" id="formModal">
    <div class="modal-content">
        <h3 id="mTitle">Catat Pengeluaran</h3>
        <form id="rForm">
            <input type="hidden" id="fId">
            <div class="form-group">
                <label>Tanggal</label>
                <input type="date" id="fTgl" required>
            </div>
            <div class="form-group">
                <label>Kategori Keluarga</label>
                <select id="fKat" required>
                    <option value="Dapur & Sembako">Dapur & Sembako</option>
                    <option value="Kebutuhan Anak">Kebutuhan Anak</option>
                    <option value="Tagihan (Listrik/Air/Wifi)">Tagihan (Listrik/Air/Wifi)</option>
                    <option value="Kesehatan & Skincare">Kesehatan & Skincare</option>
                    <option value="Transportasi & BBM">Transportasi & BBM</option>
                    <option value="Hiburan & Jajan">Hiburan & Jajan</option>
                    <option value="Lain-lain">Lain-lain</option>
                </select>
            </div>
            <div class="form-group">
                <label>Nama Barang</label>
                <input type="text" id="fNama" placeholder="Misal: Susu Anak, Token Listrik..." required>
            </div>
            <div class="form-group">
                <label>Harga (Rp)</label>
                <input type="text" id="fHarga" placeholder="10.000" onkeyup="formatRpInput(this)" required>
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button type="button" onclick="closeModal('formModal')" style="flex:1; background:#f1f5f9">Batal</button>
                <button type="submit" class="btn-primary" id="fBtn" style="flex:2">Simpan Data</button>
            </div>
        </form>
    </div>
</div>

<script>
    // MASUKKAN URL ANDA DI SINI. JANGAN HAPUS TANDA PETIKNYA.
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwUeLobYK_QILBRm612kgx9N9IVPPBfKgnVtem0hrEV3MPWMo6iXreewqZIkXlHApKA/exec'; 

    let db = [];
    document.getElementById('fTgl').valueAsDate = new Date();

    function formatRpInput(obj) {
        let v = obj.value.replace(/[^,\d]/g, '').toString();
        let sisa = v.length % 3;
        let r = v.substr(0, sisa);
        let ribuan = v.substr(sisa).match(/\d{3}/gi);
        if (ribuan) r += (sisa ? '.' : '') + ribuan.join('.');
        obj.value = r;
    }

    const toRp = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);
    const cleanN = (s) => parseInt(s.replace(/\./g, ''));

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { 
        document.getElementById(id).classList.remove('active');
        document.getElementById('rForm').reset();
        document.getElementById('fId').value = "";
        document.getElementById('fTgl').valueAsDate = new Date();
    }

    async function load() {
        document.getElementById('loader').style.display = 'block';
        try {
            const r = await fetch(APPS_SCRIPT_URL);
            db = await r.json();
            
            // Isi dropdown tahun
            const thnSel = document.getElementById('selTahun');
            const thns = [...new Set(db.map(x => new Date(x.tanggal).getFullYear()))].sort((a,b)=>b-a);
            thnSel.innerHTML = '<option value="semua">Semua Tahun</option>';
            thns.forEach(t => { if(!isNaN(t)) thnSel.innerHTML += `<option value="${t}">${t}</option>` });
            
            applyFilter();
        } catch (e) { console.error(e); }
        document.getElementById('loader').style.display = 'none';
    }

    function applyFilter() {
        const key = document.getElementById('mainSearch').value.toLowerCase();
        const thn = document.getElementById('selTahun').value;
        const now = new Date();

        let res = db.filter(row => {
            const d = new Date(row.tanggal);
            const namaHari = new Intl.DateTimeFormat('id-ID', { weekday: 'long' }).format(d).toLowerCase();
            const namaBulan = new Intl.DateTimeFormat('id-ID', { month: 'long' }).format(d).toLowerCase();
            
            const mKey = row.nama.toLowerCase().includes(key) || 
                         row.kategori.toLowerCase().includes(key) ||
                         namaHari.includes(key) ||
                         namaBulan.includes(key);
            const mThn = thn === 'semua' || d.getFullYear() == thn;
            return mKey && mThn;
        }).sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));

        render(res);
        calc(res);
    }

    function render(data) {
        const b = document.getElementById('tBody');
        b.innerHTML = '';
        data.forEach(r => {
            const d = new Date(r.tanggal);
            const hari = new Intl.DateTimeFormat('id-ID', { weekday: 'short', day: 'numeric', month: 'short' }).format(d);
            b.innerHTML += `<tr>
                <td><strong>${hari}</strong></td>
                <td>${r.nama}</td>
                <td><span class="cat-tag">${r.kategori}</span></td>
                <td style="font-weight:700">${toRp(r.jumlah)}</td>
                <td style="text-align:center">
                    <button style="padding:5px 8px; background:#eef2ff; color:#4338ca" onclick="edit('${r.id}')"><i class="fas fa-edit"></i></button>
                    <button style="padding:5px 8px; background:#fef2f2; color:#ef4444" onclick="del('${r.id}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        });
    }

    function calc(data) {
        const n = new Date();
        let h = 0, m = 0, b = 0, t = 0;
        const startWeek = new Date(n.setDate(n.getDate() - n.getDay())); // Minggu ini
        
        data.forEach(r => {
            const d = new Date(r.tanggal);
            const v = Number(r.jumlah);
            if(d.getFullYear() === new Date().getFullYear()) {
                t += v;
                if(d.getMonth() === new Date().getMonth()) b += v;
                if(d >= startWeek) m += v;
                if(d.toDateString() === new Date().toDateString()) h += v;
            }
        });
        document.getElementById('vHari').innerText = toRp(h);
        document.getElementById('vMinggu').innerText = toRp(m);
        document.getElementById('vBulan').innerText = toRp(b);
        document.getElementById('vTahun').innerText = toRp(t);
    }

    document.getElementById('rForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('fBtn');
        btn.disabled = true; btn.innerText = "Menyimpan...";
        
        const id = document.getElementById('fId').value;
        const payload = {
            action: id ? 'edit' : 'add',
            id: id || Date.now().toString(),
            tanggal: document.getElementById('fTgl').value,
            nama: document.getElementById('fNama').value,
            kategori: document.getElementById('fKat').value,
            jumlah: cleanN(document.getElementById('fHarga').value)
        };

        await fetch(APPS_SCRIPT_URL, {
            redirect: "follow",
            method: 'POST',
            body: JSON.stringify(payload),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });
        
        closeModal('formModal');
        btn.disabled = false; btn.innerText = "Simpan Data";
        load();
    });

    function edit(id) {
        const r = db.find(x => x.id == id);
        if(r) {
            document.getElementById('fId').value = r.id;
            document.getElementById('fTgl').value = new Date(r.tanggal).toISOString().split('T')[0];
            document.getElementById('fNama').value = r.nama;
            document.getElementById('fKat').value = r.kategori;
            document.getElementById('fHarga').value = r.jumlah.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            document.getElementById('mTitle').innerText = "Edit Belanjaan";
            openModal('formModal');
        }
    }

    async function del(id) {
        if(confirm("Hapus data ini?")) {
            document.getElementById('loader').style.display = 'block';
            await fetch(APPS_SCRIPT_URL, {
                redirect: "follow",
                method: 'POST',
                body: JSON.stringify({action:'delete', id: id}),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            load();
        }
    }

    function exportExcel() {
        const wb = XLSX.utils.table_to_book(document.querySelector("table"));
        XLSX.writeFile(wb, "Belanja_Keluarga.xlsx");
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Rekap Belanja Keluarga", 14, 15);
        doc.autoTable({ html: 'table', startY: 22 });
        doc.save("Belanja_Keluarga.pdf");
    }

    window.onload = load;
</script>
</body>
</html>
