<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Rekap Logistik & Belanja</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444; 
            --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; 
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .app-container { max-width: 1100px; margin: 0 auto; }
        
        /* Header & Dashboard Cards */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .header h2 { margin: 0; color: var(--primary); font-weight: 700; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin: 0 0 10px 0; font-size: 14px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .card .value { font-size: 28px; font-weight: 700; color: var(--primary); }
        
        /* Badges */
        .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; margin-top: 12px; }
        .hemat { background: #d1fae5; color: #047857; }
        .boros { background: #fee2e2; color: #b91c1c; }

        /* Buttons */
        button { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-family: 'Inter', sans-serif; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s ease; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #2563eb; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .btn-dark { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-icon { padding: 8px 12px; font-size: 14px; margin-right: 5px; border-radius: 8px; }
        
        /* Tabs for Filtering */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 20px; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Table */
        .table-container { background: var(--card); border-radius: 16px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #f8fafc; font-weight: 600; color: #475569; }
        tr:hover { background: #f1f5f9; }

        /* Modal (Pop-up) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal.active { display: flex; animation: fadeIn 0.3s; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); position: relative; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .close-btn { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 20px; color: #94a3b8; transition: 0.2s; }
        .close-btn:hover { color: var(--danger); }
        
        /* Forms */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #475569; }
        input { width: 100%; padding: 12px 15px; border: 2px solid var(--border); border-radius: 10px; box-sizing: border-box; outline: none; font-family: 'Inter', sans-serif; font-size: 15px; transition: 0.2s; }
        input:focus { border-color: var(--accent); }

        .loader { display: none; text-align: center; padding: 20px; font-weight: 600; color: var(--accent); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2><i class="fas fa-wallet"></i> Rekap Belanja</h2>
        <div style="display: flex; gap: 10px;">
            <button class="btn-dark" onclick="openModal('chartModal')"><i class="fas fa-chart-pie"></i> Analitik</button>
            <button class="btn-primary" onclick="openModal('formModal')"><i class="fas fa-plus"></i> Tambah Data</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <h3>Hari Ini</h3>
            <div class="value" id="valHariIni">Rp 0</div>
            <div class="status-badge" style="background:#e0f2fe; color:#0369a1;"><i class="fas fa-calendar-day"></i> Total Pengeluaran Harian</div>
        </div>
        <div class="card">
            <h3>Minggu Ini</h3>
            <div class="value" id="valMingguIni">Rp 0</div>
            <div id="statusMinggu" class="status-badge">Memuat...</div>
        </div>
        <div class="card">
            <h3>Bulan Ini</h3>
            <div class="value" id="valBulanIni">Rp 0</div>
            <div id="statusBulan" class="status-badge">Memuat...</div>
        </div>
        <div class="card">
            <h3>Total Tahun Ini</h3>
            <div class="value" id="valTahunIni">Rp 0</div>
        </div>
    </div>

    <div class="table-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
            <div class="tabs" id="filterTabs">
                <button class="tab-btn active" onclick="filterTable('semua', this)">Semua Riwayat</button>
                <button class="tab-btn" onclick="filterTable('hari', this)">Hari Ini</button>
                <button class="tab-btn" onclick="filterTable('minggu', this)">Minggu Ini</button>
                <button class="tab-btn" onclick="filterTable('bulan', this)">Bulan Ini</button>
            </div>
            <div>
                <button class="btn-success btn-icon" onclick="exportExcel()"><i class="fas fa-file-excel"></i> Excel</button>
                <button class="btn-danger btn-icon" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
            </div>
        </div>
        
        <div id="loader" class="loader"><i class="fas fa-spinner fa-spin"></i> Memuat data logistik...</div>
        
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Tanggal</th>
                    <th>Nama Belanjaan</th>
                    <th>Harga</th>
                    <th style="width: 100px; text-align:center;">Aksi</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div class="modal" id="formModal">
    <div class="modal-content">
        <i class="fas fa-times close-btn" onclick="closeModal('formModal')"></i>
        <h3 id="modalTitle" style="margin-top:0; margin-bottom: 20px; font-size: 20px;">Catat Pengeluaran</h3>
        <form id="rekapForm">
            <input type="hidden" id="rowId">
            <div class="form-group">
                <label>Tanggal</label>
                <input type="date" id="tanggal" required>
            </div>
            <div class="form-group">
                <label>Nama Barang / Belanjaan</label>
                <input type="text" id="namaBarang" placeholder="Contoh: Semen, Paku, atau Makan Siang" required>
            </div>
            <div class="form-group">
                <label>Harga (Rp)</label>
                <input type="text" id="jumlah" placeholder="Contoh: 150.000" onkeyup="formatRupiah(this)" required>
            </div>
            <button type="submit" class="btn-primary" id="btnSubmit" style="width: 100%">Simpan Data</button>
        </form>
    </div>
</div>

<div class="modal" id="chartModal">
    <div class="modal-content" style="max-width: 600px;">
        <i class="fas fa-times close-btn" onclick="closeModal('chartModal')"></i>
        <h3 style="margin-top:0;">Grafik Pengeluaran Tahunan</h3>
        <canvas id="myPieChart"></canvas>
    </div>
</div>

<script>
    // MASUKKAN URL DEPLOYMENT BARU DI SINI
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbylz6J6atHhRJbc_Juw5z8AVXhZIJi3vG-7J2SPVcTudTqrkptcskeP5zC76Ow9YRym/exec'; 
    
    let globalData = [];
    let currentFilter = 'semua';
    let pieChartInstance = null;

    // Set Hari ini sbg default
    document.getElementById('tanggal').valueAsDate = new Date();

    // UI Functions
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { 
        document.getElementById(id).classList.remove('active'); 
        if(id === 'formModal') {
            document.getElementById('rekapForm').reset();
            document.getElementById('rowId').value = "";
            document.getElementById('modalTitle').innerText = "Catat Pengeluaran";
            document.getElementById('tanggal').valueAsDate = new Date();
        }
    }
    
    // Format Ribuan (saat diketik)
    function formatRupiah(obj) {
        let val = obj.value.replace(/[^,\d]/g, '').toString();
        let split = val.split(',');
        let sisa = split[0].length % 3;
        let rupiah = split[0].substr(0, sisa);
        let ribuan = split[0].substr(sisa).match(/\d{3}/gi);

        if (ribuan) {
            let separator = sisa ? '.' : '';
            rupiah += separator + ribuan.join('.');
        }
        rupiah = split[1] != undefined ? rupiah + ',' + split[1] : rupiah;
        obj.value = rupiah;
    }

    // Unformat string "15.000" jadi integer 15000
    function cleanRupiah(str) {
        return parseInt(str.replace(/\./g, ''));
    }

    // Format mata uang untuk tampilan UI
    const formatCurrency = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);

    async function loadData() {
        document.getElementById('loader').style.display = 'block';
        try {
            const res = await fetch(APPS_SCRIPT_URL);
            const data = await res.json();
            globalData = data;
            calculateDashboard();
            applyFilter();
            renderChart();
        } catch (error) {
            console.error("Gagal memuat data", error);
        }
        document.getElementById('loader').style.display = 'none';
    }

    // --- FITUR FILTER TABEL ---
    function filterTable(type, btnObj) {
        currentFilter = type;
        
        // Update UI Button
        if(btnObj) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btnObj.classList.add('active');
        }
        applyFilter();
    }

    function applyFilter() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        const now = new Date();
        const currWeek = getWeekNumber(now);
        
        let filteredData = [...globalData].sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));

        filteredData = filteredData.filter(row => {
            const d = new Date(row.tanggal);
            if(currentFilter === 'hari') return d.toDateString() === now.toDateString();
            if(currentFilter === 'minggu') return getWeekNumber(d) === currWeek && d.getFullYear() === now.getFullYear();
            if(currentFilter === 'bulan') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            return true; // 'semua'
        });

        filteredData.forEach(row => {
            const tr = document.createElement('tr');
            const d = new Date(row.tanggal);
            tr.innerHTML = `
                <td>${d.toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year:'numeric'})}</td>
                <td><strong>${row.nama}</strong></td>
                <td>${formatCurrency(row.jumlah)}</td>
                <td style="text-align:center;">
                    <button class="btn-primary btn-icon" onclick="editData(${row.id}, '${row.tanggal}', '${row.nama}', ${row.jumlah})"><i class="fas fa-edit"></i></button>
                    <button class="btn-danger btn-icon" onclick="deleteData(${row.id})"><i class="fas fa-trash"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Submitting Data
    document.getElementById('rekapForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
        btn.disabled = true;

        const rowId = document.getElementById('rowId').value;
        
        // Menangkap data dan membersihkan titik ribuan sebelum dikirim
        const payload = {
            action: rowId ? 'edit' : 'add',
            id: rowId || null,
            tanggal: document.getElementById('tanggal').value,
            nama: document.getElementById('namaBarang').value,
            jumlah: cleanRupiah(document.getElementById('jumlah').value)
        };

        // Menggunakan text/plain agar tidak terkena blokir CORS Apps Script
        await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });

        closeModal('formModal');
        btn.innerHTML = 'Simpan Data';
        btn.disabled = false;
        loadData(); 
    });

    // Edit Data
    function editData(id, tgl, nama, jml) {
        const dateObj = new Date(tgl);
        document.getElementById('rowId').value = id;
        document.getElementById('tanggal').value = dateObj.toISOString().split('T')[0];
        document.getElementById('namaBarang').value = nama;
        
        // Format nominal ke tampilan ribuan saat diedit
        let valRp = jml.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        document.getElementById('jumlah').value = valRp;
        
        document.getElementById('modalTitle').innerText = "Edit Pengeluaran";
        openModal('formModal');
    }

    // Delete Data
    async function deleteData(id) {
        if(confirm("Yakin ingin menghapus item ini?")) {
            await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'delete', id: id }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            loadData();
        }
    }

    // Dashboard Logic
    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
    }

    function calculateDashboard() {
        const now = new Date();
        const currWeek = getWeekNumber(now);
        const currMonth = now.getMonth();
        const currYear = now.getFullYear();

        let dThis = 0;
        let wThis = 0, wLast = 0;
        let mThis = 0, mLast = 0;
        let yThis = 0;

        globalData.forEach(r => {
            const d = new Date(r.tanggal);
            const amt = Number(r.jumlah);
            
            if(d.getFullYear() === currYear) {
                yThis += amt;
                if(d.getMonth() === currMonth) mThis += amt;
                if(d.getMonth() === currMonth - 1) mLast += amt;
                if(getWeekNumber(d) === currWeek) wThis += amt;
                if(getWeekNumber(d) === currWeek - 1) wLast += amt;
                if(d.toDateString() === now.toDateString()) dThis += amt;
            }
        });

        document.getElementById('valHariIni').innerText = formatCurrency(dThis);
        document.getElementById('valMingguIni').innerText = formatCurrency(wThis);
        document.getElementById('valBulanIni').innerText = formatCurrency(mThis);
        document.getElementById('valTahunIni').innerText = formatCurrency(yThis);

        const statM = document.getElementById('statusMinggu');
        if (wThis > wLast) { statM.className = 'status-badge boros'; statM.innerHTML = `<i class="fas fa-arrow-up"></i> Naik dari mgg lalu`; }
        else { statM.className = 'status-badge hemat'; statM.innerHTML = `<i class="fas fa-arrow-down"></i> Turun (Hemat)`; }

        const statB = document.getElementById('statusBulan');
        if (mThis > mLast) { statB.className = 'status-badge boros'; statB.innerHTML = `<i class="fas fa-arrow-up"></i> Naik dari bln lalu`; }
        else { statB.className = 'status-badge hemat'; statB.innerHTML = `<i class="fas fa-arrow-down"></i> Turun (Hemat)`; }
    }

    function renderChart() {
        const ctx = document.getElementById('myPieChart').getContext('2d');
        const monthlyData = Array(12).fill(0);
        globalData.forEach(r => {
            const d = new Date(r.tanggal);
            if(d.getFullYear() === new Date().getFullYear()) monthlyData[d.getMonth()] += Number(r.jumlah);
        });

        if(pieChartInstance) pieChartInstance.destroy();
        pieChartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'],
                datasets: [{ data: monthlyData, backgroundColor: ['#ef4444','#f97316','#f59e0b','#84cc16','#22c55e','#10b981','#14b8a6','#06b6d4','#0ea5e9','#3b82f6','#6366f1','#8b5cf6'], borderWidth: 0 }]
            },
            options: { cutout: '65%', responsive: true, plugins: { legend: { position: 'right' } } }
        });
    }

    // Export PDF/Excel disesuaikan dengan Filter Tab
    function exportExcel() {
        const table = document.getElementById("dataTable");
        const wb = XLSX.utils.table_to_book(table, {sheet: `Laporan_${currentFilter}`});
        XLSX.writeFile(wb, `Laporan_Belanja_${currentFilter}.xlsx`);
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(`Laporan Belanja - Filter: ${currentFilter.toUpperCase()}`, 14, 15);
        doc.autoTable({ html: '#dataTable', startY: 20 });
        doc.save(`Laporan_Belanja_${currentFilter}.pdf`);
    }

    window.onload = loadData;
</script>

</body>
</html>
